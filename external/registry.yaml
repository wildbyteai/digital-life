# 外部 Skill 引用注册表
# 运行 skill-box link <name> 来引用外部 skill

registry:
  - name: colleague-skill
    display_name: "同事.skill"
    description: "翻译同事的职场暗语：'辛苦了'=终于能交差了；'我帮你看看'=别指望我"
    source: clawhub
    install: "clawhub install colleague-skill"
    enabled: false

  - name: ex-skill
    display_name: "前任.skill"
    description: "用聊天记录复刻前任人格：知道她什么时候撒娇、什么时候真的生气"
    source: clawhub
    install: "clawhub install ex-skill"
    enabled: false

  - name: boss-skill
    display_name: "老板.skill"
    description: "翻译老板的场面话：'这个方案还行'=重做；'我们再讨论'=毙了"
    source: clawhub
    install: "clawhub install boss-skill"
    enabled: false

  - name: mom-skill
    display_name: "老妈.skill"
    description: "中国妈妈的微信翻译器：'多穿点'=担心你；'邻居家孩子又…'=又在比较了"
    source: clawhub
    install: "clawhub install mom-skill"
    enabled: false

  - name: relative-skill
    display_name: "亲戚.skill"
    description: "过年饭桌生存指南：'有对象没'=开始攀比；'工资多少'=开始比较"
    source: clawhub
    install: "clawhub install relative-skill"
    enabled: false

  - name: barber-skill
    display_name: "理发师.skill"
    description: "Tony 老师的潜台词翻译器：'稍微修一下'=准备大改"
    source: clawhub
    install: "clawhub install barber-skill"
    enabled: false
