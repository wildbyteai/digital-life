name: Validate digital-life

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate repository structure and scripts
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python scripts
        run: python3 -m py_compile scripts/*.py

      - name: Validate skill contract and repository layout
        run: python3 scripts/validate-skill.py

      - name: Validate demo skill package
        run: |
          python3 scripts/package-manager.py validate examples/skill_packages/writing_style_demo
          python3 scripts/package-manager.py validate examples/skill_packages/decision_principles_demo

      - name: Run demo skill package static tests
        run: |
          python3 scripts/package-manager.py test examples/skill_packages/writing_style_demo
          python3 scripts/package-manager.py test examples/skill_packages/decision_principles_demo

      - name: Run profile doctor
        run: python3 scripts/profile-manager.py doctor

      - name: Run Python unit tests
        run: python3 -m unittest discover -s scripts -p 'test_scripts.py'

      - name: Check CLI versions for publish readiness
        run: |
          python3 scripts/profile-manager.py --version
          python3 scripts/validate-skill.py --version
          python3 scripts/package-manager.py --version
