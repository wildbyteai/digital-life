name: Validate digital-life

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate repository structure and scripts
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python scripts
        run: python -m py_compile scripts/*.py

      - name: Validate skill contract and repository layout
        run: python scripts/validate-skill.py

      - name: Run profile doctor
        run: python scripts/profile-manager.py doctor

      - name: Run Python unit tests
        run: python -m unittest discover -s scripts -p 'test_scripts.py'
