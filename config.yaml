# Skill Box — 数字人格考古工具箱

toolbox:
  name: "Skill Box"
  version: "0.2.0"
  description: "数字人格考古工具箱 —— 用你的数字痕迹照见真实的自己"
  philosophy: "未经审视的人生不值得过。这些 skill 帮你把数字生活的碎片拼成一面镜子。"

# 内置工具
skills:
  legacy-audit:
    name: "遗产清算"
    icon: "🪦"
    description: "以死者视角回看自己的数字生命"
    philosophy: "海德格尔：向死而生"
    enabled: true
    module: "skills/legacy-audit.md"

  cringe-archaeology:
    name: "社死考古"
    icon: "💀"
    description: "找回还没学会表演的自己"
    philosophy: "阿伦特：公共与私人的边界"
    enabled: true
    module: "skills/cringe-archaeology.md"

  ai-clone:
    name: "AI替身"
    icon: "🤖"
    description: "当你的社交行为可以被完全复制，'你'还剩什么"
    philosophy: "图灵：什么是'你'"
    enabled: true
    module: "skills/ai-clone.md"

  past-life:
    name: "前世"
    icon: "👻"
    description: "你以为是'性格'的东西，可能只是惯性"
    philosophy: "佛教：业力与因果"
    enabled: true
    module: "skills/past-life.md"

  epitaph:
    name: "墓志铭"
    icon: "🪦"
    description: "在活着的时候，看到自己的结局"
    philosophy: "塞涅卡：论生命之短促"
    enabled: true
    module: "skills/epitaph.md"

# 外部引用
external:
  colleague-skill:
    name: "同事.skill"
    source: "community"
    description: "翻译同事的职场暗语"
    philosophy: "维特根斯坦：语言游戏"
    status: "available"

  ex-skill:
    name: "前任.skill"
    source: "community"
    description: "用聊天记录复刻前任人格"
    philosophy: "弗洛伊德：哀悼与忧郁"
    status: "available"

# 扩展设置
extension:
  custom_dir: "skills/"
  auto_discover: true
  max_skills: 50
